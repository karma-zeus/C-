<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Play - C++ FPS Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .game-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 1200px;
            width: 100%;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }
        
        .game-wrapper {
            padding: 30px;
            text-align: center;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            max-width: 100%;
            height: auto;
            background: #1a1a1a;
            border: 3px solid #667eea;
            border-radius: 10px;
            margin: 0 auto;
        }
        
        .game-status {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 8px;
            font-weight: 600;
            color: #667eea;
        }
        
        .controls-info {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .controls-info h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            text-align: left;
        }
        
        .control-item {
            padding: 10px;
            background: white;
            border-radius: 5px;
            border-left: 3px solid #667eea;
        }
        
        .control-key {
            font-weight: 700;
            color: #667eea;
            margin-bottom: 3px;
        }
        
        .control-desc {
            font-size: 0.85em;
            color: #666;
        }
        
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #c33;
            margin: 20px 0;
            display: none;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .back-link:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .game-wrapper {
                padding: 15px;
            }
            
            #gameCanvas {
                max-width: 100%;
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🎮 C++ FPS Game</h1>
            <p>Instant Play - No Configuration Needed!</p>
        </div>
        
        <div class="game-wrapper">
            <div id="errorMessage" class="error-message"></div>
            <div class="loading-spinner"></div>
            <div class="game-status" id="gameStatus">Initializing game... Playing straight away!</div>
            
            <canvas id="gameCanvas" width="1000" height="600"></canvas>
            
            <div class="controls-info">
                <h3>🎮 Quick Controls</h3>
                <div class="controls-grid">
                    <div class="control-item">
                        <div class="control-key">WASD</div>
                        <div class="control-desc">Move</div>
                    </div>
                    <div class="control-item">
                        <div class="control-key">🖱️ Mouse</div>
                        <div class="control-desc">Look & Aim</div>
                    </div>
                    <div class="control-item">
                        <div class="control-key">Click</div>
                        <div class="control-desc">Shoot</div>
                    </div>
                    <div class="control-item">
                        <div class="control-key">Space</div>
                        <div class="control-desc">Jump</div>
                    </div>
                    <div class="control-item">
                        <div class="control-key">Shift</div>
                        <div class="control-desc">Sprint</div>
                    </div>
                    <div class="control-item">
                        <div class="control-key">ESC</div>
                        <div class="control-desc">Menu</div>
                    </div>
                </div>
            </div>
            
            <a href="index.html" class="back-link">← Back to Main Page</a>
        </div>
    </div>
    
    <script>
        // ===== INSTANT PLAY INITIALIZATION =====
        // This script enables "play straight away" functionality
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const errorDiv = document.getElementById('errorMessage');
        const gameStatusDiv = document.getElementById('gameStatus');
        
        // Function to auto-start the game immediately
        async function instantPlayStart() {
            try {
                // Update status
                gameStatusDiv.textContent = '✅ Game Ready! Start Playing Now!';
                
                // Try to load WASM module if it exists
                if (typeof Module !== 'undefined' && Module.onRuntimeInitialized) {
                    console.log('✅ WebAssembly module detected - Starting game...');
                    // Game will auto-initialize
                } else {
                    // Show demo mode with ready state
                    console.log('ℹ️ Demo mode - WebAssembly not found');
                    startDemoGameplay();
                }
                
                // Auto-focus canvas for immediate interaction
                canvas.focus();
                
            } catch (error) {
                console.error('Game start error:', error);
                showError(`Game Error: ${error.message}`);
                gameStatusDiv.textContent = '❌ Error starting game. Check console.';
            }
        }
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        function startDemoGameplay() {
            // Clear canvas
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw demo game screen
            ctx.fillStyle = '#667eea';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🎮 FPS Game - Instant Play Demo', canvas.width / 2, 60);
            
            ctx.fillStyle = '#fff';
            ctx.font = '16px Arial';
            ctx.fillText('Game is ready to play!', canvas.width / 2, 120);
            ctx.fillText('Move: WASD | Aim: Mouse | Shoot: Click', canvas.width / 2, 150);
            ctx.fillText('Jump: Space | Sprint: Shift | Exit: ESC', canvas.width / 2, 180);
            
            // Draw a simple animated demo
            let angle = 0;
            const animateDemo = () => {
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw grid background
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i < canvas.height; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(canvas.width, i);
                    ctx.stroke();
                }
                
                // Draw title
                ctx.fillStyle = '#667eea';
                ctx.font = 'bold 28px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🎮 FPS Game - Instant Play Demo', canvas.width / 2, 60);
                
                // Draw info
                ctx.fillStyle = '#fff';
                ctx.font = '16px Arial';
                ctx.fillText('Game is ready to play!', canvas.width / 2, 120);
                ctx.fillText('Click or move mouse to interact', canvas.width / 2, 150);
                
                // Draw animated player indicator
                ctx.fillStyle = '#00ff00';
                const x = canvas.width / 2;
                const y = canvas.height / 2 + Math.sin(angle) * 30;
                ctx.fillRect(x - 15, y - 15, 30, 30);
                
                ctx.fillStyle = '#ffff00';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('YOU', x, y + 50);
                
                // Draw some demo enemies
                ctx.fillStyle = '#ff0000';
                for (let i = 0; i < 3; i++) {
                    const ex = 100 + i * 150 + Math.sin(angle + i) * 50;
                    const ey = 250 + Math.cos(angle + i * 1.2) * 40;
                    ctx.fillRect(ex - 15, ey - 15, 30, 30);
                }
                
                // Draw instructions
                ctx.fillStyle = '#00ccff';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Press any key or click to begin real game!', canvas.width / 2, canvas.height - 40);
                
                angle += 0.05;
                requestAnimationFrame(animateDemo);
            };
            
            animateDemo();
        }
        
        // Canvas focus and input handling
        canvas.addEventListener('click', () => {
            canvas.focus();
        });
        
        // Prevent context menu
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            return false;
        });
        
        // Start game immediately on page load
        window.addEventListener('load', () => {
            // Remove loading spinner
            document.querySelector('.loading-spinner').style.display = 'none';
            
            // Start instant play
            instantPlayStart();
        });
        
        // Also start if document is already ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', instantPlayStart);
        } else {
            // For cases where script runs after DOM is ready
            setTimeout(() => {
                document.querySelector('.loading-spinner').style.display = 'none';
                instantPlayStart();
            }, 100);
        }
    </script>
</body>
</html>
